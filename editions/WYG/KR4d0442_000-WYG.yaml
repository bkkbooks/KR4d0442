body:
  text: 竹素山房詩集别集類四元提要臣等謹案竹素山房詩集三巻元吾丘衍撰衍字子行其先本太末人居于錢塘其名或稱吾衍或稱郚衍或稱吾世衍其號或曰竹素或曰竹房或曰貞白工𨽻書精小篆兼通聲音律吕之學所著有尚書要畧聽𤣥集九歌譜重正卦氣道書援神契説文續解今皆未見惟楚史檮杌晉文春秋學古編周秦刻石音釋四書已別著録子史二部中此其所著詩集而文二篇亦附焉衍自比郭忠恕性剛希偶貴人求見者輙拒不納王禕傳稱東平徐子方持部使節命駕訪子行子行亦為一一評定所蓄器物欵識人皆稱其下士而衍集中又有送商繼顯詩云君能下士傾里閭時嘗過我談詩書丈夫貴義乃如此髙懐可似東平徐是當時折節與交者固不獨子方一人矣其詩不屑屑謹守繩墨而逸氣流蕩清新獨闢塵客俗骨剗掃殆盡可稱一時作手晚年為人所累被攝得釋持一詩別其友仇逺徑去不知所之既而知其自沈死其詩云劉伶一鍤事徒然蝴蝶西飛別有天欲語太𤣥何處問西泠西畔斷橋邊別見于釋宗泐集而此三巻中無之意者遺稿為衍所自編故未經載入歟朱存理樓居襍著有書吾氏類集一篇稱虞山襍抄内有竹房集三巻予家有其招雨師文等篇遺迹一冊録附集後其巻帙與此本合蓋猶舊帙云乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:72cd8c8c205ccc0e307c2bba084ce389182dadad60d6cf2fd36a297cfde94e92
