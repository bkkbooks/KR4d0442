body:
  text: 竹素山房詩集卷一元吾丘衍撰藏雲閣凌空結飛甍歷覽周逺山白雲爾何來憩我棟宇間前山過風雷此地無暝色惟應山中人與爾共休息龍吟軒四山若龍盤精廬剡溪曲中有不蟄龍長吟破幽緑道人宴坐起拂袖窗牖開手持碧琅玕聽此風雨來送謝卿游北黃鵠振六翮一舉凌蒼穹髙飛固其常誰言待秋風十月江水寒候鴈别沙磧我守塞門居君為逺行客木葉落古道回首東山雲朔野極渺茫神州望氤氲闕談笑識公子問君阻山川胡為倐來此取任非有意觀海同此心託贈行邁篇遙遙寄遐音陳渭叟贈新茶新茶細細黃金色葛水仙人贈所知正是初春無可侣東風楊栁未成絲大滌洞天二十韻九鎖神仙地靈踪隔世紛仙翁能引客天柱半侵雲翠雨時霑袂𤣥惟自作羣秦橋遺螮蝀漢土賴𤣥纁丹在泉猶暖山深地不分烟霞藏石壁洞府隱星文燃竹窮幽討穿林望夕曛陳蘇留勝槩葉鄧踵清芬境靜山如洗香柔草自薰行嗤謝公屐坐笑郢人斤巳似華陽洞還通紫海垠神遊真浩汗𤣥覽極氤氲太華追韓愈黃庭想右軍林梢攢翡翠地角聳麋麏岩穴蛟龍祕芝田鳳鳥耘無人逢郭舉有路識茅君蛻骨繁青篛浮根漾紫芹宜霜秋樹老搗藥夜禽聞登陟勞何憚招攜意闕勤終當餐石髓蕭散得欣欣丁未嵗哀越民越壤吳江左州民泰伯餘田萊空草莽井色共蕭踈相食能無忍傳聞信不虛寒沙滿骸骨掩骼意何如梨花鸜鵒圖三月花開雪滿枝肯將春色讓黃鸝它年調舌如能語休語開元夜雨時送金華何道心公侯秉鑒懸清空羣材照影青雲中垂天鵬翼忽九萬齊門彈瑟悲回風人生抱負豈得已何况壯志欺英雄昔君校書江山邑官舍淒涼廣文客爾來留滯吳山陽薇花秋風幾朝夕萬言杯水何足道知己相逢各傾倒鏡湖道士今已無髙陽酒徒亦烟草我憶列仙乘太虛君如鄒陽長曳裾他年一笑復相見吳山月色知何如畣蔣𢎞父㑹稽莫春見寄我有謝公志游山好名山嘗時把酒醉風景此心遂與烟雲閒君逰剡水春未還東山石磴窮登攀千花羅綺照春媚百鳥喧哢娛心顔盤桓岩幽訪禹跡竹隂樹影莓苔色靈書久祕不可窺飛空餘編竟誰識人間樂事風散烟人生誰復能千年黃金不鑄子期壽賢達每在希神仙長江隔烟水江流幾千里我吟李句懷謝公東山薔薇花始紅溪村酒熟琥珀味諸君日日歌春風王君東山士襟期應可人傳來白璧未酬價光彩照耀梁臺珍石扉掩蒼潤閒徑䕃美竹臨風逺寄江水音可對春風為豫讀十二月樂辭并閏月正月羲和日馭鞭蒼龍璇璣夜轉行天東鵝黃拂烟栁條短伶倫竹聲催晝暖金刀錯落紅錦絲玉叉鬢影東風吹芙蓉酒濃香染衣花樓鳳語黃蜂飛二月晴光漾漾琉璃波垂楊掃黛嚬青蛾紫絲步障芳草陌薄露春香蟬翼羅鶯簧吹笙教春語花落無雲過烟雨傳頭舞紅鸚鵡杯東風燕尾參差開三月紅枝綵樹金流蘇籠香染露開九衢沉香小院鶯語澀晚漏蟾蜍遲玉壺楊花飛飛風蕊蕊蝴蝶迷香粉魂死水光鴨緑暖悠溶草色江南一千里四月依微緑雨冥濛天圓荷散水青蓮錢晨階步花空土澀玉柱濕絲移蜀絃南風遲遲度簾額樹葉迎涼小秋色槐枝未晚噪蟬催夢中蝴蝶空中飛五月石榴花始紅菖蒲花淺碧湘簟水風涼生羅汗微濕青蟲化飛蛾穴蟻登南柯前山雨腳來逺色雲嵯峨六月南山日色紅火雲山下起老樹無涼隂野鳥渴飛死重厭藕絲裳寒思玉井水何處有秋風鳴蟬晚聲碎七月迎新涼對華月桐階風來月如雪草根蟲聲催搗衣銅龍怨寒千里思銀河影長更漏遲八月桐隂間玉砌金井生涼雲扇欹嫦娥輝簟拂湘妃痕愁怨草蟲語舞厭楚綃薄燭樹來何遲螢飛上羅幕九月鉛花飛霜滿枯草搖落風來楚山老海神收水無泪痕鴻飛古樹啼老猿雲低晝簷秋影昏十月北風吹雲晝陰短錦畫屏風獸香暖謝家十二玉絲弦不待昭陽九華琯新花學春小無力枯桑葉青霜草碧秋蟲飲雨未令歸壤穴牆陰土花濕十一月飛沙走寒幾千里霞絲不起羅紋紫魚龍水合青海愁寒木空林曉鳶死玉臺仙子琥珀鍾簾衣半卷迎東風鸞刀剪秋秋水溶舞鸞墮影來虛空十二月風驚鴈陳鳴寒天迎春燕綵飛聨翩星門十二轉華月三十六簧吹暖烟瓊芳散漫舞幽碎酒力微昏不成醉盡衣送嵗鼓逢逢椒花翠盤分小紅閏月新春遲遲舊春改日積餘分幾分在嫦娥兔宫圓影多二十六弦遲嵗華夢回夢裡看花錦繡城淺深桃杏五霞明覺來忍聽催花雨可是春風太有情製羽服成有作我愛王子晉飄然恣天游碧桃舞吹笙花落曽城秋江海浩無際人生復何求還丹有神光服食登昆丘此意世豈知俯步趨王侯火汗熱五內烏貂弊霜裘吾生獨冥心𤣥覽探至幽烟彩晦春麗雲泉白空流翦素作羽衣被服歌瀛洲逺與世俗間倣佛仙者儔真人九霞中顧我應㸃頭揮挽紫玉樹浩蕩瞻空浮使我逺望之回送飛母虬土食向我混雞栖漫沈留何能慰吾懷天風五城樓如意篇世巧吾所後𤣥金起塵泥華芝鼓神爐至寶驚海霓平飛劔飛鋩醉舞河漢低歌翻玉壺氷男折珊瑚枝古士日以邁人今孰如兹王夷麈毛輕葛亮空羽資表世各有尚陶仙乃吾師我攜白雲中鸞鶴為我飛髙舉軼虛曠凌霞扣天扉一笑竹化龍空隨長房歸題楊氏竹石梅石森平野叢篁隱石根絶憐頑鈍質無語對龍孫贈宋道夫詩并敘宋道夫作影數謂豫晚年有洞天之祿余竊喜之道夫嘗師鍾學古鍾曽於栁下遇仙人青陽子得異書故其術多異驗因贈以詩神聖覩河洛造化窮隂陽靈書祕𤣥言妙測無隱藏臨江宋道夫精藝名久揚為我作影數知來意何長寒灰巳無然豈復生夜光鶴化或可待烟霞庶翺翔青陽去遙遙鍾叟道乃彰觀化忽神化令人慕遐荒朱仲山買李生琴吳客抱緑綺玉絃響氷絲胡為飄然闕飛去别所知河輪佩將將山叟詎我欺神化不可駐周流自天期歸休白羊山拂袖松桂枝一奏鸐舞操冷風為相隨千金爾何神致此太古姿真趣適有㑹冥心契遐思君吟泰俗歌晉野知可師長詠復相寄如聽白鷴辭濁酒或易謀華軒且遲遲楊寺洞中吹簫獨攜鳯管入巖扉樹拂春風草拂衣不敢更吹天上曲恐驚石散作雲飛陳公輔聽雨軒帝子吟瀟湘瀟湘雲烟竟茫茫楚客歌洞庭洞庭木葉空秋聲豈如敬亭山前野人宅西風不驚響雲滴燭花未剪書在牀愛爾𤣥音起虛寂忽無復有天灑灑來自然山中枕流人知聽洗耳泉神融意適有真趣汝南郭泰來何暮忽憶隴頭水罷我膝上琴旅人動遐思無此瀟灑心君不聞岩花悲歌杜陵老山雪空回剡溪棹祁寒暑雨惟怨咨流麥漂衢竟誰道與君歌聽雨秋雨最可聽明朝雨歇雲亦散月色滿地秋冥冥西瓜詩萍實浮楚江楚人乃見疑不逢魯中叟誰羡耀日姿秋風滿淮甸縈蔓絡紫絲邵圃失顔色翠華射玻瓈當筵鼓金刀破此傾酒巵玉露滴蒼珮月氷散紅犀寄言作歌人勿詠黃臺詩賦得調氷珮環初碎響齊庭亞父錕鋙玉斗驚太華井寒雲液重金莖露冷雪花明欲浮仙浪歸河漢無復靈瓜破水晶相府碧筒君勿醉涼風羽翼自身輕洞山吟并序南谷杜尊師重建宗陽宫于西廡後立𤣥元館祀老子及關尹以下凡十一又於後圃纍土石為洞山樹梅其下山頂俯視若擁素雲俾豫作洞山吟歌之君不見愚公移山山不移夸娥負山山不知君不見釣鼇人歸龍伯國三山依然鎮東極江流曲折吳越分越山氣接吳山雲吳山脉斷鳳凰去𤣥洲鶴侣丹紛紛𤣥元之真人揮手來玉京蓁蕪掃盡見真境丹臺紫殿何峥嶸鞭雷驅山走滄海歘忽三山宛然在俯看琪樹玉柯明不信人間嵗華改洞山有洞何所之天游萬里那能期無名仙老不可問碧花瑶草草風吹我逢真人問真訣笑指髙堂闕莊列歸來為賦洞山吟他日披雲卧松雪雁影聨翩罔象楚江干倐忽飄搖畫亦難散㸃自衝斜日去愁陰空落暮烟寒墨痕不定悠悠水雅陳還迷渺渺灘身外有身同此意人間繒繳謾相看夏日睡起言志布穀啼稍歇修篁滿西軒匡林足薰風對此晝掩門丹經倦披翻濁酒猶在尊一飲醒渴肺再斟詠𤣥言盧敖我思之𢎞景道豈繁古士邈雲漢良懷想瑶琨朝陽倐西曛念彼嵗月奔顔貌不可恃青青去𤣥根采真固難名求道或有源三徑若可賦吾將老丘樊秋晚門望晴山逺風寒落木初尚嗟鄰市井未得近樵漁露果宜新酒藜牀只素書浮生易飄忽且欲賦閒居贈打碑吳居士二絶句天上琅文網絳紗垂芒廓落字聱牙何當拂此來人世為識清都蔡少霞曽於水火識陰陽拂拂𤣥虛道乃彰知白定應能守黑不須更覔大還方酒醒試野服酒醒微風入天髙白鶴飛坐看烟景變何日洞天歸髮亂便紗帽身閒且布衣未能逃姓字轉欲見人稀見虹返照餘光白斜虹帶雨長半天分逺近二氣䙝陰陽媧石猶能見秦橋不見梁龍淵在何處倚望極蒼茫九月十五月食九道銅渾缺望舒坐看明水失方諸豈知天上麒麟鬭不顧人間蚌蛤虛丹桂有陰秋寂寞嫦娥無夢夜何如西風回首山河外修政能忘太史書挽劉牧之廉使聞說飛鸞下九霄白頭懶赴玉堂招醉中野服方蕭散夢裏軒車竟寂寥别墅人空丹桂老小山雲去紫臺遙故原歸葬松蘿慘目送征魂萬里飄挽裴德游府君蕭颯西風緑野秋琅玕摧折鳳雛愁卧龍未必壺中醉飛夢終為海上逰白髮每逢師柱史青門何處覔秦侯豈知目斷烟霞客欲問盧敖竟莫留竹素山房詩集卷一
