body:
  text: 竹素山房詩集卷三元吾丘衍撰讀孫康侯北遊集丹鳳昔飛舞銜書出天京孫登起蘇門赴此萬里行覽古愜幽趣題詩播清聲琅琅四百篇往往物外情歷險客懷倦憑髙壯心驚歸來鬢如絲蘭草秋露榮年貌不可恃浮雲竟縱橫論交故人稀矯首朔雁鳴江漢十年外逺遊慰平生香囊蟬翼輕綃玉縷稀碧花瑶草鬬芳菲一方彩霧籠清氣半剪春風戀薄衣楚水佩間江草怨東山碁罷野蜂飛金猊灰冷休重炷鳳帶流蘇舞翠幃沈堯道寄梨花山中折花搖白雲一枝贈我寒食春薄簾隔晴不須卷恐隨蝴蝶飛成塵秋晚入夜寒砧作秋蟲語亦哀易催風物改不逐日車移疏懶終何益優遊每在茲重陽今又過興盡菊花期春日尋玉清陸尊師不遇留題几上我來初陽山髙步陵春風竹松一何陰鬱翠入半空稽首勾漏仙擬覔修靜翁飛駕忽有適間房卧絲桐翻書慰遙心觀化嗟轉蓬欲問玉虛事神物若為通白羽何處來猶自碧海東憑爾寄我思揚言闕玉佩謡昆吾剪月吹天風鸞絲貫縷聲瓏瓏珠華闌珊舞回步宓妃催喚蓬萊宫聨翩鳳帶春風碎曳雨搖雲楚腰醉仙人琪樹生晚寒洞中敲折青琅玕卷荷破荇穿萍礙緑波雙尖搖蕩碧雲柯水荷要織芙蓉錦借與鮫人紫玉梭觀水雨後長流寫急湍奔雷轉石噴虛寒憑誰挂起三千尺試作廬山瀑布看南風清鳴蜩無聲秋雨空半山影落殘霞紅手攜白羽坐晚色長松鼓舞來天風九日雨中寄玉清道侣野徑黃花發蕪城忽暮秋已成彭澤懶不作汝南遊鳬舄終遐舉匏瓜豈暫留相看風雨際何用識江州暮嵗即事北風竟日吹寒雨雲濕天低鳥不飛殘雪山中消巳盡早梅江上見猶稀年光忽去足可惜壯心空在每多違東郊明朝春色動樓前應可瞻晴輝桃花絳彩酣春色嬌香膩午風誰云蜀江浪不與武陵通度朔千年在玄都一夜空粧臺意無盡餘恨滿青銅歸鴈南國春時不似秋春風腸斷燕飛樓憑君莫問空中字一帶聨翩寫去愁古采蓮濕風吹花生冷香馮夷為舞水絲裳霏霏粉金飄晚塘浮蘭舟鼓桂楫歌采蓮為君發遲遲歸來㺯明月送人歸隱郭臺賢夢逺黃金奕奕良才竟陸沉朽索豈維千里馬樊籠難畜九臯禽雲霄我漫存髙志竹素君能契夙心此去扁舟忽回首他年野服重相尋范令新茶詩南山發榮秀金彩布曉陽驚雷爾何遲奕葉粲以芳園夫履晨露采掇盈篚筐石火不待溫變此嘉卉蒼仙㽔入京甸茲焉得餘香晨寒井浮花鼎暖雪泛光起坐豁幽思形神共相忘玉漿瓊房仙啓齒為我嘗却顧玉川子招攜碧雲鄉柳絲效李義山細縷垂窗戶依依影若空無因夢春服有恨織東風葉小眉何在蠶成意不同商絃未須絶恐怨楚王宫和張養明九日人名絶句晉朝神器已危傾天下飛塵尚未清當日倘無王刺史有誰攜酒訪淵明九日龍山盛管絃此時司馬亦醺然不因席上西風起誰識參軍孟萬年題闕鄭子吾楚秀文章煥神淵北望言逺遊手把泗水邊昔我識汶叟嘗聞魯山川居民有淳風古服尚宛然今送子復去鴻飛冒寒天長河合層氷土井無暖泉雪片沒枯草嚴風折重綿長歌杏壇春俯拜闕里前行道各有志韶音振朱弦回首郭愧臺期君步雲煙張伯雨贈黃精山中有靈草乃云太陽精況聞天老言餌之可長生故人赤松意分贈慰我情玉津比玄芝采采三秀英我願服此久飄然出寰瀛緑髮無秋霜身如羽翰輕舉臂入霄漢丹臺列髙名手把金芙蓉與君遊太清寄柯德楊蘭色驚秋色來儀困赤霄無書能纍月慰我忽今朝道在非彈瑟途窮豈折腰山陰清絶地且為息炎歊落鴈圖水天曽見真如畫煙雨還看畫似真沙上一行飛又去江南老盡白頭人暢上人文溪别業文暢青蓮客回溪别業開南山當驃騎東海極蓬萊空鏡思懸錫中流且度杯相尋多法侣冉冉下天台聞蔣𢎞父重五遊葛嶺有詩因寄五首湖雨朝仍作山雲晝不開竹枝蒼鳳濕石蘚紫雲堆放飲多仙興狂歌欠我來平生慕函谷擬學抱關梅雨急簷檻冷牆陰薜荔長清遊能不阻羽士復相忘巾子山雲黑鵝兒酒色黃遙伶佩蘭客寂寞向三湘山路行踈雨真遊自有期問舟尋古井把酒賦新詩巳似陶元亮能無逺法師道人相問好我到未多時海中有蓬萊萬里阻弱水靈蹤不可到真境復在此丹藏碧山秀臺空白雲起何能錬金沙往結浮丘子危亭出空山葛公仙祠古松聲起玄籟竹林散飛雨觀身嗟雲浮傾觴慕遐舉吾將復朝陽人事遽如許權上人翠玉軒道人坐西軒此君對幽獨碧雲曉不去清風晝相續爐香誦楞伽闕心目我亦超世士金篇屢嘗讀待我山中來更尋虎溪陸送友人還江西文彩垂星虹欲獻明光宫琉璃水沉紫煙潤花生彩筆搖春風行行辭家幾千里交遊每結青雲士爾來客舍依我鄰夷説悠德不歸意燕山五色雪舞花大河一夜回仙槎故園桂松色依舊人民城郭還驚嗟丈夫平生原闕栁枝詞一徑梨花過雨霑日華浮動碧絲簾前軒插遍垂楊栁看舞春風闕簷贈吳孟郯孟郯今畫妙揮灑得天真夙昔來仙骨清髙似古人忘機惟我共知巳復誰鄰忽寄桓玄宅飛騰易有神春雪寄戴衆甫春雪飛能急春風曉更寒已判終日飲不厭倚樓看山鵲鳴聲碎江梅舊蕊殘無因訪安道大野正漫漫宣城陳公輔曉訪贈鏡古鏡若寶劒千年有光芒銅花紫苔紋不染氷井涼客有陳孟公旅宦自逺方清曉訪我舍主賔共相忘隱隱懷袖中出此片月光卧視復仰照依微見陵陽秋水倒不飛七錦各異章撫玩樂此惠神交思悠長朗誦璚玖音晨華翠雲張和周翰林景逺夏日謝氏池亭南軒過雨竹陰添翠羽參差不礙簷一片好風何處起蛟綃舞上碧絲簾贈刋生林玉我愛林生刻畫勞能於筆意見纎毫牙籖小字青銅印頓使山房索價髙莫種樹莫種樹種樹陰我屋長大如蓋青茫茫何用春風暫時緑休洗紅休洗紅洗紅紅在水舊紅因水來今復水中棄長安少年多負恩漂毋猶自哀王孫終南道士問漢碑柱史談經地終南古迹存神仙能間出道德豈虛言河漢秋雲冷城池海氣昏羽翰如可致細與問真源字灑金壺墨傳聞古二仙崇臺何杳杳至道極玄玄令尹今誰再延熹嵗巳千無由操九節悵望想雲煙方壽父贈桂珠篇嫦娥采香廣寒陌兔杵搖空響秋碧染香拂天移素煙搗碎黃金失金色五絲繞環雲纚纚玄珠聨翩出秋水天風羽衣生晚香蘭葉枯寒九華佩仙人騎羊白山下招手蓬萊促煙駕樹邊吳質未全醒粉霞綬冷花飄零凍解凍解羣生發乾坤萬象新戀晴瞻曉日卧病惜佳辰堯典文章在周原草木春吾衰已如此未省筆如神吳仁甫送酒雲液輕紅滴露珠玻璃盞內看如無秋深不管黃花老為引仙人白玉壺新嵗新嵗來飄忽匆匆十日過晝眠方嘆息好景易蹉跎食薄終何補才荒幸不磨壯心猶激烈試誦醉時歌立春日今日春風至冥濛細雨來已知蘇萬物況乃潤羣材德澤從茲布陽和向北回病軀方強飲霑灑望熙臺贈刻圖書錢拱之男錢瓛二絶句唐人小印網蛛絲漢篆陰文古且竒賴有錢生能識此免將古譜較參差一種青銅自琢磨爾家銅色似宣和十年為爾騰聲價不道平生篆巳多畫眉效李商隱東風曉鏡照桃花蛾緑初調印淺紗嬌栁對分春葉淡遙山橫拂暮煙斜月鈎剪玉姮娥妬蟬翼飄雲衛女誇誰識漢朝京兆尹少年腸斷楚天涯送陸靜復遊張公石室騎驢入石璧我聞古仙人洞天祕雲煙道隱孰與親羽士玉清侣浪迹寄隱淪鍊真闕陽山採秀葛水濵乘興憶遐趣飄然問飈輪西風滿空山桂子玉露新闕有地天香散衣巾折桂勿久品桃花易千春喜雪連嵗冬無雪今來忽應時臘前能屢白望久得相宜闕意不遲開軒一壺酒擬作夢魚詩守嵗四十明朝是燈花此是春鄉閭猶舊俗笑語雜比鄰衰鬢難重黑芳年喜再新杜陵方自得獨酌任吾真招雨師文大德三年夏六月天旱不雨民以為憂且祠禱多不應文士吾衍呼雨師而告之為之文而焚之曰穹宇之分奠兮以溷以清噓以為煬兮吹之以冷爰施降之有序兮下上以寧旁礡之有所或冷兮皇覽告余以不成惟茲夏之亢盛兮草木暵以蚤零曷有淹之不沛兮火騰轡兮輘兢望凱風之靡至兮呼萍翳兮弗興魃倡披以騁騖兮吾有哀夫民之懲龜大荒之疆􅎌兮爞后土之陰精恐暍死之駢道兮蔓天造之忠貞芻靈䗲兮齊以盛神之徠兮靁為霆欵帝坑子復徠下庶九有兮民惟正圉赤魃兮山以圍風爾駕兮雲爾旗玄澤下兮萬福釐陳吾辭兮其陳茲桃花雨樂府一章寄翼之秦源春夢陽臺晚風散驚紅作秋苑間陰碧樹搖暖雲茸苔羅水香氛氲蝶飛不濕煙綿路吳娥怨澀鸞階步參差海羽雙燕來依微石舞瀟湘回古詩一首送翼之回吳遊子動歸思南風起秋聲我亦當此時相送難為情交朋尚如斯況爾懷父兄三吳亦鄰邦一水非逺程君還姑蘇臺我留鳳凰城兩地各相望馳心互奔傾流光若頽波彼此即寓萍浮世苦離散輾轉百慮縈何能慰余懷握手徒營營次韻謝翼之華翰西臺妙文章五鳳樓美才須比玉直道豈如鈎吳苑辭春色江風散旅愁吾廬正瀟颯二仲得羊求菌耳遍沃野菌耳遍沃野瓊芝亦芬芳羣陰掩其茨誰復知爾良我願得此草移根植崇岡間攀紫金㽔挹露晞朝陽服食換緑髓輕舉過紫皇招攜三辰遊與之同輝光與鄰寓人隔壁對月夜話禦寇連牆屋神交得謝瞻謝有隔屋夜語事偶逢吾所契共語月當簷微祿終何補良才尚此淹憑君縱玄論未怪發幽潛將進酒年少不再得朱顔易凋零春濃不作賞春去春風亦笑人無情平湖照天浮醁醽湖邊栁色蛾眉青逺山空翠盡煙淡扁舟畫舸何縱橫金壺有酒君且傾桑田屢變湖邊亭人生得意且酣暢羲和六轡無停行我吹玉簫對楊柳君當長歌更揮手意闌酒盡各自歸榮辱於人復何有神仙休錬九轉丹焦身苦思良為難不如逢春對酒但適意且與笑樂開心顔金魚曲二首錦霓散影飛海空霞漿浩飲酣羣龍紫鱗一夜變春色瓊丹照耀桃花紅珊瑚折鈎舞條脫守宫暗泣凝嬌血碧塘煙水涵霧沙水中火色神仙家天吳魂驚夢欲死神輝煌煌赤龍子仙人剪霞擲波淺紅玉依微錦光晚絳綃落佩流彎環碧水悠溶暖嬌轉桃花成鱗飛錦梭彩虹短折珊瑚柯玉璫移階照晨影御溝夢冷鴛鴦波晚涼曲南風吹雲散天碧髙槐無聲暮蟬寂彈冠罷沐氷紵香輕握停揮素鸞翼衝風鳥羽南去遲弦月欲上光參差飛闕卷簾鈎網絲碧簟欲冷秋依依仙興天風無聲起蒼茫道人騎鶴方翺翔雲門不關白玉洞仙花吹落香滿牀雪中丘子正見過風落天花飄酒尊卷簾間見玉乾坤故人乘興遙相過也勝王猷不到門密雪歌長天雪低海鵬翼飛璚成花曉階白網幃斜揭螭尾銜不放龍綃障春色陽春按徹秦曲斷酒色鵝黃獸香暖錕鋙未照璀璨光月彩先浮碧雲碗梨花飛晴白日下香老黃花絮飛野餘春不散流水風房結幽寒自蘭麝春來春去花亂蜂六花意與梨花同茂陵髮白意何事未央瓦冷金莖空長歌郢中玉壺缺蘇武氊寒漢臣骨相如肺渴思故園吳姬莫道匙金澀七夕歌瑶鬟初粧晚雲緑金雀低飛鳳凰玉曲闌十二開錦樓簾卷鮫鮹老魚哭飈車帝子神光隨西風嵗嵗銀河期玉蟾欲弦未光彩金針九孔行氷絲青蚨盤旋曉不去露盤無聲竹枝曙錢良佑名記吳郡錢翼之名良佑或告之曰佑字從人字書所無不可也或又曰易之與詩佐佑字止作左右於書則為從人或去人或者可也豫謂之曰皆是也古書篆文字不能備故六書有假借漢用𨽻字則稍備矣然有通用字且仲尼之仲在漆書作中後雖從人不過以中為義猶佐佑之左右也況尚書以漢出時人以𨽻字易科斗則從人之佑出于𨽻也漢繁陽令楊君碑有大司農劉佑碑用𨽻字則漢有佑字明矣由是則士之生乎漢後者名此佑字不為無據當存名如故唐人有杜佑作通典云竹素山房詩集卷三
