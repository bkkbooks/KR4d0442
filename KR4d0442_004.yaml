body:
  text: 竹素山房詩集附録吾子行文冢銘金華胡長孺撰吾衍字子行太末人大父為太學生留弗歸遂家錢唐子行工篆𨽻書通聲音律吕之學讀太𤣥經號貞白處士慕李長吉詩樂府效其體為之氣韻輒與相似性曠放有髙世不仕之節自比張志和郭忠恕玩䙝一世遇人巧官善富如蟲蛆臭腐將噬染已其所猒棄者詣門請謁從樓上遙與語吾出有間矣顧彈琴吹洞簫撫弄如意不輟求室委巷教小學常數十人未成童坐之樓下與客對笑談喧樓上下羣童一是肅安好譏刺輕侮詩人文學士獨盛稱仇仁近婺胡穆仲汲仲至謂百年亡有其著述有尚書要略晉文春秋楚史檮杌說文續釋道書授神契卦氣間中編等書初子行年四十未娶所知宛丘趙天錫為買酒家孤女為妾女嘗妻人年饑棄歸母與後夫匿弗言輒去之太末妾為子行産子數日死留五年當至大四年秋故夫微知妻處訟之逮母母來死子行所又逮後夫後夫復舍于子行因僞楮幣事覺捕得言主人子行固弗知邏卒辱子行南行數百步録事張景亮識子行叱邏者曰是不知情者攝之何為即解縱遣歸臘月未盡二日甲午子行持詩一章暨𤣥縚緇笠以詣仁近别值晨出家留詩還縚笠子行去不知所之其詩曰西泠西畔斷橋邊意將從靈均於斯明年三月辛酉衛天隱以六壬筮之得亥子丑順流象曰嵗子月巳旬寅斯首亥為水鄉巳墓在丑惟子與丑無祿霣虛墓非其藏死沉江湖是生戊辰土為宰制土弗勝火家絶身棄此其骨朽淵泥九十日矣與詩合西湖多寶院主僧可權從子行學詩聞其定死哭甚哀為琬良石鐫碣院後與浮屠師遺塔相望曰皆吾師請長孺銘庶幾子行有後世名其銘曰嗚呼生不瀆死不辱貞哉白郚衍傳金華宋濓述郚衍字子行杭人也意氣簡傲不為公侯屈色嘗自比郭忠恕居生花坊一小樓客至僮輒止之通姓名使其登乃登亷訪使徐琰一日來見衍從樓上呼曰此樓何敢當貴人登邪願明日謁謝使節琰素重衍笑而去生徒從衍遊者常數十百人衍坐童子地上使冠者分畨下授之時出小青涼傘教之低昂作舞勢或對客游談文􅛐解髮濡酒中為戲羣童為肅容莫敢動衍左目眇又跛右足一俯一仰嫵媚可觀宛有晉宋間風致畜兩鐵如意日持弄之或倚樓吹洞簫數曲超然如忘世者性好譏侮文學士獨推服仇逺及胡之純長孺兄弟謂百年間所無有初衍年四十未娶買酒家女為妾至大三年秋或訟女嘗為巳妻官為逮女母母死逮母後夫夫來主衍家㑹其僞券事覺連及衍衍固弗知也邏卒辱衍南出數百步録事張景亮識之叱曰是不知情何攝也即遣歸或有訴衍承相府事得下杭府殆臘月未盡二日甲子衍持詩别仇逺竟去不知所之明年三月辛酉衛天隱以六壬筮之得亥子丑順流之象曰骨汚淵泥久矣多寶院僧故從衍學為詩聞其死哭甚哀招魂葬之西湖上衍通聲音律吕之學善效李賀詩工𨽻書猶精于小篆其志不止秦唐二李間宛丘趙期頥以書名世得之衍者為多其所著書有尚書要略聽𤣥造化集九歌譜十二月樂辭譜重正卦氣楚史檮杌晉書春秋道書授神契說文續解石鼓詛楚文音釋學古編竹素山房詩世多傳焉說者曰衍之才髙矣使其能自貶以入繩墨則其所進孰敢抗之哉今所學僅若是固可尚也亦可悲也雖然衍亦竒士也夫吾丘子行傳華川王禕吾丘子行者名衍太末人也其先為宋大學生留弗歸遂家錢塘至子行比三世子衍嗜古學通經史百家言工于篆籀其精妙不在秦唐二李下而于音律猶精然性放曠不事檢束眇左目右足跛而風度特醖藉一言一笑皆可喜對客輒吹洞簫或弄鐵如意或援筆製字旁若無人每以郭忠恕自比自號貞白處士僦居陋巷中教生徒常數十人未成童者坐之樓下賔客談笑喧動鄰舍而樓上下之徒常肅然達官貴人聞子行名欵門候謁非其意斥弗與見或從樓上遙與語弗為禮或與為禮矣送之弗下樓也東平徐公子方海內大老也持部使者節浙西所蓄古器物欵識多莫能辨咸以為非子行無能知者徐公即命駕訪子行子行為一一鑒定之徐公未嘗不嘆服其精敏于是人皆謂徐公能下士而子行非果於傲世者矣子行為詩不純守法律而喜著書所著有尚書要略聽𤣥集九歌譜十二月樂詞譜重正卦氣楚史檮杌晉文春秋道書授神契說文續解周秦刻石釋音學古編其修辭立論皆識見超詣人所弗及故用是自負藐視一世其所稱許者惟錢唐仇仁近永康胡汲仲穆仲三人于他詩人文士悉少許可動加譏刺不顧人喜恕不知者不堪其謔侮知者以其類乎滑稽不恤也初子行年四十未娶買賣酒家孤女為妾不久即死死且久人或誣告子行妾嘗為巳妻有司逮妾母而妾母已再適人居他州及來死子行所又逮妾母後夫後夫來復舍子行而坐僞鈔事覺竟連子行知情子行懼走訪仁近值仁近蚤出即留詩以去遂莫知所之後三月吳人衛天隱以六壬筮之得亥子丑其詞曰嵗子月巳旬寅斯首亥實水鄉己墓在丑惟子惟丑無祿殞虛墓非其藏死沉江湖是嵗戊辰土為宰制土弗勝水家絶身棄此其骨汙淵泥九十日矣筮與所留語語合乃知子行已投水死其弟子為招魂以葬而汲仲為之銘為說者曰篆籀之學自宋季其敝極矣國朝以來始子行倡其說以復于古而吳興趙文敏公實和之其學乃大明子行可謂博雅之士哉子行既殁得其學以名世者宛丘趙子期濮陽吳孟思子期仕至執政而孟思今猶布衣云吾衍傳太原王行著吾衍者字子行其先太末人也大父為宋太學生徙錢唐遂為錢唐人衍工篆𨽻書明律吕著書史能屬文辭所著有晉文春秋楚史檮杌說文續釋尚書要略等書居錢唐市側委巷一樓蕭然惟法書銘刻古編鍾鐃磬如意之屬置左右時撫玩用為娛樂有豫章人以音律自喜聞衍名造之衍與語合甚既而扣所列鍾鐃間曰音何屬客曰某也又擊其次客曰某也扣遍言率合衍後東柱下鎛鍾擊之鎛形弇其音涵沍客審聽之曰宫乎衍笑曰宫當渾以圜重以闕茲鬱勃不發非宫也而不比他辭蓋古棄鎛耳客乃服明年攜一鎛鐘復來詣衍則衍死矣因倣徨欷歔不能去歎曰吾學無所正也初衍年四十未娶宛丘趙天錫為買釀工孤女為妾妾母嫁後夫夫以私造楮弊事覺避逺來衍所衍意其省女弗察及逮卒根逐至衍舍及接後夫出併係衍道逢録事張景亮知衍事謂卒曰是不知情奚攝為趨舍之衍既脫猶不釋然即為詩别其友仇逺徑去旦日逺讀衍詩怪其語異常隨跡其處竟莫知所往逺後行湖上微訪之有買酒老媪自云常識衍所曳屨遺水際逺始悟詩中意乃知所自湛死矣時至大四年也衍性剛簡希偶所善惟金華胡之純長孑焉正兄弟暨逺他雖稱貴人求知之非所合率拒不肯見每出常獨行不求侣遇明霽時日之湖山間無定適任步所至便道以沽酒飲微醉箕踞長歌其所為樂府詩歌已輒放聲慟哭乃返家逼市無曠隙地當月明則持洞簫來屋騎脊而吹聲怨愴而慷壯聞者輒能别識既死咸傷悼曰簫聲不作矣有桑門可權嘗從衍學詩哭之甚痛求尸不得有為以六壬筮之得亥子丑順流象曰尸漂不可見已權弗信益購索之終不獲云余少時聞長老言衍死人咸髙其不受屈或曰是褊心輕已自喪余嘗悲之其不受屈非也褊心則然謂其輕已自喪過矣以衍之不肯妄知人與觀其長為大慟時意氣彼其所自負者甚重也惟髙視一時謂當世無足知己則固有遺世矣而橫逆之激切之此遽捐其生也雖然使衍能夷然委順以其學自善其身蓋有餘裕顧乃不懲小忿害滅其性以取不弔之譏嗚呼惜己贈吾子行浦城楊載春雨連城濶春雲映戶多長衢方淖濘小水亦風波抱獨能如此思君可奈何便當乘興去著屐一相過酬吾子行耿耿思朋舊悠悠涉嵗華既依秦大姓方問魯東家雅道將誰與新詩敢自誇秪今能㑹合不憚路途賖題子行所藏魚藻圖晝出鯈魚戲緑漪羣分小白更相隨主人真得䝉莊趣視此洋洋樂可知書吾子行篆書陰符經四明袁桷唐世陰符始大行原於李筌成於李靖貞觀皇帝始酷好之命禇河南凡書一百九十本貞觀之意蓋廣用兵之說耳李筌托神姥之言乃曰上有神仙抱一中有富國安民下有强兵戰勝又妄增六注以惑後人然終不可悉解而吾子行復書之何邪唐人作篆惟書千文蓋懼學者之未易察也徐鉉作項王亭賦倣李陽氷裴公德政碣之遺意子行沉困市隱豐碑巨碣不能以自見寫其幽曠託焉以自逃者也余嘗聞善書者大篆不得入小篆𨽻書最懼入八分使子行在吾願相與評焉贈吾世衍名有廢號竹房顧梅山士友多交接惟君有敬心少年精古篆諸老喜新吟簫品神仙曲琴彈山水音無人知此樂只在竹房深吾子行夢蝶壇疏四明任士林誦五千言嘗究猶龍之㫖以六月息載開夢蝶之壇善戲謔兮志怪者也載惟真白方丈布衣道士存方寸地卧百尺樓有淳于髠之滑稽有東方朔之博物賈誼升堂相如入室惜不用賦於天子之門李雍識面王翰卜鄰肯嘆誤身于文人之聽于是心超蟬蛻之境神游鳥跡之初蘧蘧然栩栩然何必扶搖三千里九萬里誾誾也侃侃也不妨咏歸五六人六七人莫笑邊孝先請問南華子題吾子行瘞猫文後子愛猫如愛人性馴善捕有人理也故封有丘瓦有書象有肖匪溺斯礉乎狗馬忘辭帷蓋至矣次韻吾子行新年有道貧方樂無營坐亦深新詩知病後老鬢覺年侵信有乾坤力時勞江海心文園亦消渴渾愧白頭吟已分身將隱還驚老易過時來慰岑寂相與惜蹉跎白髮短猶櫛青銅暗欲磨人生有如此我醉子當歌雪後春風起天空江水來新年渾作客多病孰憐才有道身先老無人首屢回承禎須不爽聞已掃丹臺用子行韻簡周景逺應奉供奉平生酒中郎絶代書自便青瑣直未放碧山居輩行人誰在行藏意自如絲綸須世掌曽識典墳初和吾子行見寄韻坐覺秋風老貧猶借屋居長年空竹素何地不蘧廬道義時相慰行藏日可書人生有知己我亦出無車吾子行挽詩錢良佑余自至元元貞間客杭得交子行父雖齒在余先甚欵密也余往來于杭有年間歸吳門每承以詩及書尺見寄余猶有存者其過山村翁訣别之詩按胡汲仲先生塜銘乃至大四年也越三十一年為至正改元始見其手迹于廬山甫家感悼之餘為作七言一首以附于后亦挽之之意云時余六十有四無人家擬地行仙自號青霞小洞天愛竹每留緣郭寺吹簫時泛過湖船詩魂渺渺波搖月篆腳垂垂雨在川老我猶能見遺墨可堪回首斷橋邊觀吾子行别仇山村詩作絶句弔之子行詩云劉伶一鍤事徒然胡蝶西飛别有天欲語太𤣥何處問西泠西畔斷橋邊天台釋宗泐吹簫人去竹房空海內猶憐學術工最是西泠橋畔路淡烟疏栁夕陽中跋吾子行墨蹟後天台徐一夔吾子行先生篆𨽻得周秦石刻之妙前輩論其字畫殆千百年而一見此誠不刋之論其法今具于所著三十五舉學古之家苟得其法于言意之表可以脫去俗習而趨于古獨先生之歿距今未及百年而其墨跡己無存者抑豈博古者寡邪崔彥暉氏工篆書雅慕先生墨蹟而不可得一日在市肆中忽見先生篆書瘞鸐銘一通𨽻書寄友人近體詩一首共一張因購得之不啻如獲重寶彥暉請余識于紙尾熟視久之歎曰使此紙落于他人之手不過故紙視耳而彥暉得之真有合哉因為識之且慶其有此獲也先生性狷介不與俗合後不知所終朋友招其魂葬之胡先生長孺志其出處于墓甚悉且又無後余來杭學治鄉賢祠以其行藝可以範俗并祠之云次子行二詩有序葉森先師貞白先生手書柳枝梨花二詩遺陳渭叟後三十年渭叟出以見贈觀之不覺墮泪乃用韻補遺四首花雨初收宿霧霑緑陰春意滿重簾莫教飛絮隨流水半拂河橋半拂簷洗粧倚䦨曽夢雲光凝蝶粉玲瓏春璚芳深閉緑窗曉東風不敢吹香塵展卷長吟淚已霑尖風吹柳不吹簾可伶寒食西湖上猶自新條拂短簷玉簫聲斷愁飛雲幾年夢冷梨花春草𤣥弟子今尚在零落江南雙鬢塵崑崙歌寄吾丘子行翠鸞啼雲天四垂花龍雙雙神姥歸全仙憶君淚如水昌陽落花青蕊蕊曽城珠闕揚素氛開明信信環九門羲和走馬不待人鯨魚吸海海生塵若有人兮悵修阻紫玉參差老鳳語笑揮如意教雲舞雲間鶴雛生兩羽歸來歸來勿蹉跎秋風吹折玕琪柯題吾子行遺墨後周砥立世守茲道毅然生死間奄去同其盡榮辱豈相關若人固可悲弔溺吾所艱蕭瑟見遺墨風雨慘客顔秦唐去我逺二李無時還世傳斯有在懇哉不可攀和丹丘韻悼吾子行遺硯張伯雨故人亦復葬江魚空向人間憶子虛月下簫閒留譜在竹邊房冷倩誰居蓬萊弱水題金簡汲冡先秦見漆書惟有研山磨不朽時時泪滴玉蟾蜍悼吾子行道士凌雲翰布衣為道士舉世莫能偕遽作騎鯨客空遺夢蝶齊陽氷書瘦硬方朔語詼諧墓碣銘貞白臨文每愴懷山中聞簫憶吾子行李垣之飛樓六月無塵影況復羣山日相引朝登日到窗户遲夜坐露逼衣裳近樓中有客吹洞簫星河滿地光動搖仙人岩幽鬼一足披髮跳嘯山之椒天髙愁魂渺莫測碧竹秋風嫋餘泣倚䦨三弄招不歸月照松根蟲瑟瑟忽憶吾生夙好事南游取管湘江涘雙蛾鰥寡兩茫茫一曲時能寫其思髙哉福地可置身昔年屢約何因循明朝作書附行雲為余速往邀斯人竹素山房詩集附録
