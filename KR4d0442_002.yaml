body:
  text: 竹素山房詩集巻二元吾丘衍撰書陳道士止酒詩後真樂不在酒髙吟豈為狂誰能採菊似陶令籬東若待江州王陳仙紫霞客脱洒吾所識天瓢不染人世香曽向瑶臺醉春色玉桃屢食王母笑眉髮千年若年少世人徃徃猶見之對人但寫空中辭長江滔滔九江水江流注海無窮巳錦腸光射虹影昏未必塵漿可濡此陽春從昔和者稀大音既發餘音低隋侯明月照車乘紛紛魚目空塵泥髙陽小飲夸漢祖伯倫荷鍤終何補君不見餐霞樓上飛鳳凰釀玉蟻穴蒼苔荒春夜對月夜色春仍好樓虚滿月華淡烟同引索暖桂不成花望影弦初上憑髙月為賖芳林漸葉宻更起故林鴉題牡丹圖九天霞色染精神髙與羣芳别帝臣彷佛沉香亭下意何當重見謫仙人洛城曉洛陽曉氣浮春空花風漾暖香濛濛油車碧鈿金騕裊染露蹴烟移海紅回廊複宫洞房隔夢入瑶臺買春色疊栁蛾眉蜀帳昏誤識銅駝錦香陌鸞悲鏡舞秋茫茫簾移日光春晝長春晝長恨春草胡蝶飛來髩先老戊申二月八日春社宰肉陳平老祈年舊禮傳雜花芳艸外新燕暖風前東越猶糠覈西山自管絃村民思社雨把酒對青年好雨好雨來還歇霏霏入暮多蘚牆遺舊濕庭樹忽新柯生意能如此黎民喜若何田疇近東作為美玉山禾仙人藍采和像紫府仙人號采和酒壚曽見幾回過青錢謾引痴兒笑未必仙機在踏歌白描倦繡圖烟茸霧態玉芙蓉啼鳥無聲小院空誰信傷心蝴蝶夣却因秋色怨東風戊申嘉稔南畝晨烟白西風萬寶成人民減饑色井陌聚歡聲髙廩還堪賦饞烏為浪驚耕耘豈吾事轉覺媿平生胡穆仲輓歌詞出處嗟吾道窮經獨暮年凋零魯先哲感激漢遺賢青簡餘心在金華客夣懸寥寥想孤鶴弔影白雲邊種竹近種牆陰竹幽人此見分巳添瀟灑趣不礙徃來雲書帙光能映林泉志頗欣秋風生意好翠氣日氤氲除夜雪中萬火千門俗浮天萬井烟雪中逢此夕老去惜殘年栢葉寒新採椒花喜屢傳春風幸可待更雨坐燈前王復元輓歌詞昔赴公車日官占忤大臣歸來從白首老去有蒼昊泉石心何固文章氣益神談𤣥竟絡絶愴惻重傷神仇仁父解秩建康有新文曰金淵集老去陶元亮歸來向子平鄉闗成久别故舊喜相迎卜宅來江燕移尊笑海鯨新傳浣花句未怪作金聲送商繼顯昔送春水别悠悠嵗華遷亷車忽東來清風滿長川我家衡門古城曲養素居真抱幽獨少年未免笑陳平委巷何人重干木君能下士傾里閭時恒過我談詩書丈夫貴義乃如此髙懐可似東平徐鳳凰銜書紫雲闕驛使連催向春發此行莫嗟老相隨尚父猶能賛綸綍青雲萬里何茫茫㝠鴻不飛天路長瀛洲松桂各有意未應闕笑孤蘭芳人間聚散豈得已義士由來重知巳璅陵舊隱固依然東山須為蒼生起漢㑹稽銅虎符牙璋舊制此能存銘刻昭昭漢後元太守未慚司馬狥未信左契不虚言銅韋皋像貞元美化出成都遺愛文翁道豈殊三寸青銅人未識可堪指㸃笑侏儒馬虛中為廬山黄尊師畫西湖烟雨湖山秀絶錢塘西六鼇截岸開雲霓瑶峯綵樹綺羅色孰將烟雨㸔㝠迷昔年繁華有如此金碧樓䑓畫圖裏今來觀畫想當年一片生綃但烟水紫霞道士璚樓仙棲真養素𤣥又𤣥含毫深霧入幽思寫開十里玻璃天玻璃浮天漾天色倒影斜分雨雲墨元暉有意共蒼茫豈在西孃艷彫飾晴天散雨東風吹雨收巳覺非當時它年攜此故山去松風灑瀑遥相思周達可隨奉使過真臘國作書紀風俗因贈三首裸壤無霜雪西南極目天豈知雲海外不到斗牛邊異域聞周化竒觀及壯年揚雄好風俗一一問張騫絶域通南舶炎方接海濤神仙比徐市使者得王敖異俗書能記夷音孰解操相㸔十年外回首興滔滔漢界踰銅柱蠻邦近越裳逺行隨使節蹈海及殊方鴃舌勞重譯龍波極大荒異書君已著未許劒埋光因上人以所畫陶隱居留别真僧寄人間雲影落大地倐來無本行暫止寧有意嘗覽物外史覺士吾所欽擾擾萬境中丹葩耀陽林徃年識因公古貌白毫相今年重相逢逺意益踈放金策掛山壁衲衣懸竹枝了然離言辭明珠浄摩尼陶公古仙人道備入海岳寫容寄遐思神交慰寥邈一鏡攝衆影萬有道所將相送湖水隂空雲起蒼茫演上人歸雪峯昔誦梁苑賦雪山峙西方茲峰一何髙玉影發夜灮演公禪門秀法海一葦航逺叅天目僧回憇中峰旁向我説方外飛鴻㸃滄浪雪飛本無花雪盡復何有豈如故山中寒光射牛斗學道當解此純白含性宗想同覺禪師空山對芙蓉洪崖圖神物相隨似六丁千年一到洛陽城世人若欲知名字問取山中衞叔卿題闕徐市音弗樓船入紫烟咸陽宫殿夣三泉華山雲白青松老却笑秦皇不得仙鄭中行欲聽洞簫我有鳳玉管琅然韞天音能令鍾子期不聽山水琴鄭叟識我趣入郭迺見尋語意不盡言髙情寄長吟何當良夜秋逸舉懐古今舟泛碧水月聲揺紫雲林揮手絶世念與君契遐心桃源避世成仙豈怨秦翠霞丹靄景長春不因野水流花出此地何由識晉人海棠困雨愁烟濕錦絲脂痕輕染㝡嬌枝曲闌長斷春風晩花未開時色已衰暮烟効韋蘓州冉冉浮素空悠悠隔秋樹幽禽何處來冲破怱飛去雨後小橋一夜生春水得意鸕鷀㺯淺深却喜東風愛顔色細吹不遣落花沉初夏竹樹吹涼滿檻前南風收雨淡無烟晴雲一片㸔如雪我欲呼來直上天湘妃牋湘水一萬頃九疑共茫然南廵嘆重華影落蒼梧烟娥皇與女英泪洒泣野泉竹冷濕幽翠鸞飛望寥天淒涼水雲飄䰟斷五十絃曲盡人不忘才子遺妙篇觀此拂空素南風起樓前送陳渭叟還葛溪景徳觀葛溪去錢塘一百三十里仙人有遺迹丹光玉泉水昔年左仙翁九鍊金色紫服之上雲漢人仰空劍履橘亭一何幽笑爾千樹李蘓耽亦仙人臨水昔種此渭叟得真道羞將釣璜比摘芳咽金液汲井漱晨齒遥追兩仙趣撫掌白雲裡居山十二載松雪自知己歸去請勿遲龎公厭城市答吳仁甫列子居鄭甫舊與南郭鄰連牆不相過跡逺道愈親多君卜歸意樓望湖水濵玉壺照青夫游躍見紫鱗終久一相訪西山望氤氲長江巨浪圖巻中秋色似江臯已覺軒忩走六鼇笑我氣呑雲夣澤更將椽筆起波濤醱醅銀河瀉液迎春風揺光泛影琉璃鍾芙蓉泣霜膩香薄石髓滴花浮玉蟲氍毹紅深五雲熱漏壺水盡蟾蜍渇欲借金莖一寸氷滿堂笑㸔妲娥月詠史殽函恃險竟何如虎視乾坤歸六虛空向人間焚典籍宫中尚有不韋書歌風臺上凜英雄玉斗鴻門事已空何事封侯先雍齒可怜紀信竟無功初月初月浮新彩秋清過雨霑含輝猶脉脉凝望極纎纎玉兎知何處金鈎忽上簾西山彩霞外容易别髙簷中秋翫月初陽臺有約不徃夜分有作明日寄同約諸公今夜仙臺月清寒發夜深遲囬阻雲物悵望憶登臨玉管閑清吹銀河耿太陰無才媿𤣥度聊為續長吟月色月色今宵好當空一鑑全照雲收暮雨散影自遼天林宻揺金屑簾疎漏玉泉有懐思謝尚捨棹泊長川題吳孟郯畫溪山雨霽圖雨過西風晩陰晴向此分溪山浄如染猶有未歸雲聞蟬城郭南風裏今朝始聴蟬忽如髙樹杪瀉落半岩泉耳静生涼思窻開醒晝眠無因飽清露愛爾似神仙如上人字月印詩海色涵天碧金波湛玉壺山河同影幻上下合空無圓覺名方定真如道豈殊盧敖一囬首照水弄𤣥珠贈馮供奉二絶句朝元閣上五色牋囬首春風二十年今日相逢宫樹老始知方朔是神仙開元天寶夢中春曽捧泥金下紫宸舞㡌槿花容易落等閑老却太平人過玉泉東山白石路霜草相因依碧泉吐明珠隠隠涵玉輝拊闌紫鱗驚日暮倒影歸犀火或可然吾當測幽㣲尚方連環歌為孫康侯徵君作有序徵君應聘之明年召對日親錫以連環其環隠起旋螭左右鱗㳫轉軸其在後合之則環面俱隠開則復連綰以碧縚寵禮之厚者昔明皇賜宋璟金著以表其直此其比徳歟因獲載觀俾作連環歌尚方結緑藍田春鹿盧宛轉開龍鱗神妃輾輪出宫沼躩落夔螭盤素雲朝元真人紫霞客宣室金門曉初入奚官捧環天語開調笑耕烟種雙璧青絲綰空作藍綬淺綴流蘓玉虹走歸來佩服對虛皇千秋萬嵗南山夀聽張供奉歌赤壁二首蒼顔白髮紫雲歌舊説秦青奈爾何一曲貫珠聴不盡西風餘韻繞庭柯銅臺翠瓦散春烟歌舞人空曲尚傳不意秋風寥落後江南更識李龜年寄奉化任叔實釣鼇海上任公子曽與莊周釣秋水長風鼔浪非所憂斷掣虹霓未云巳時人聞此謂我夸我聞為君長驚嗟欐梁不為䑕穴用天河乃可横仙槎君家昔住海東邑栁侯一見如曽識相逢大笑傾酒壺誦君文章洗胷臆東風吹船忽西下揚馬聲名孰相借醯雞未信雲中鸞結緑青萍豈聞價人才自古難過知丈夫未肯輕揚眉杜陵豈是不鳴者孟生老作襄陽兒炎歊吹風九天熱相憶林幽灑雲髮拄杖可待或有期為掃秋空待明月題李仲賔使君畫瀟湘烟雨竹緑雲繞湘川九疑亦㣲茫帝子不可見碧鸞自翺翔李侯灑秋毫冉冉烟雨鄉猿嘯非我聽龍枝日騰驤緬懐濯纓人於焉詠滄浪折我青琅玕與之拂扶桑竹素山房詩集巻二
